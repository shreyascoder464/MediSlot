<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('All Appointments')}"></head>
<body>
<nav th:replace="~{fragments :: nav('Admin Panel')}"></nav>
<main class="container">
    <h1>All Appointments</h1>
    <section class="panel table-wrap">
        <table>
            <tr><th>Patient</th><th>Doctor</th><th>Date</th><th>Time</th><th>Reason</th><th>Fee</th><th>Status</th></tr>
            <tr th:each="a : ${appointments}">
                <td th:text="${a.patient.name}"></td>
                <td th:text="${a.doctor.name}"></td>
                <td th:text="${a.slot.slotDate}"></td>
                <td th:text="${a.slot.startTime + ' - ' + a.slot.endTime}"></td>
                <td th:text="${a.reason}"></td>
                <td th:text="${a.fee}"></td>
                <td><span class="status" th:classappend="${a.status.name().toLowerCase()}" th:text="${a.status}"></span></td>
            </tr>
        </table>
    </section>
</main>
</body>
</html>
