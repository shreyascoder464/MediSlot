<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Available Slots')}"></head>
<body>
<nav th:replace="~{fragments :: nav('MediSlot Patient')}"></nav>
<main class="container">
    <h1>Available Slots</h1>
    <div class="alert danger" th:if="${error}" th:text="${error}"></div>
    <section class="panel">
        <p class="muted" th:if="${#lists.isEmpty(slots)}">No available slots for this doctor.</p>
        <table th:unless="${#lists.isEmpty(slots)}">
            <tr><th>Date</th><th>Time</th><th>Reason</th><th>Book</th></tr>
            <tr th:each="s : ${slots}">
                <td th:text="${s.slotDate}"></td>
                <td th:text="${s.startTime + ' - ' + s.endTime}"></td>
                <td colspan="2">
                    <form th:action="@{/patient/book}" method="post" class="inline-actions">
                        <input type="hidden" name="slotId" th:value="${s.id}">
                        <input name="reason" placeholder="Fever, pain, checkup..." required>
                        <button class="button primary small">Book</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>
</main>
</body>
</html>
