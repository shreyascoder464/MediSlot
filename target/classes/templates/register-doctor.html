<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Application | MediSlot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container narrow">
    <section class="panel">
        <h1>Doctor Verification Request</h1>
        <p class="muted">Your account becomes active only after admin approval.</p>
        <div class="alert danger" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/register/doctor}" method="post" class="form grid-form">
            <label>Name</label><input name="name" required>
            <label>Email</label><input type="email" name="email" required>
            <label>Phone</label><input name="phone" required>
            <label>Password</label><input type="password" name="password" required minlength="6">
            <label>Specialization</label>
            <select name="specializationId" required>
                <option value="">Select</option>
                <option th:each="sp : ${specializations}" th:value="${sp.id}" th:text="${sp.name}"></option>
            </select>
            <label>Qualification</label><input name="qualification" placeholder="MBBS, MD" required>
            <label>Medical Registration No.</label><input name="registrationNumber" required>
            <label>Experience Years</label><input type="number" name="experienceYears" min="0" required>
            <label>Clinic Name</label><input name="clinicName" required>
            <label>Clinic Address</label><input name="clinicAddress" required>
            <label>City</label><input name="city" required>
            <label>Consultation Fee</label><input type="number" step="0.01" name="consultationFee" min="0" required>
            <label>Bio</label><textarea name="bio" rows="3"></textarea>
            <button class="button primary full" type="submit">Submit for Admin Verification</button>
        </form>
        <p class="switch-link"><a th:href="@{/login}">Back to login</a></p>
    </section>
</main>
</body>
</html>
