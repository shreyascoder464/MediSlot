<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title + ' | MediSlot'}">MediSlot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar" th:fragment="nav(title)">
    <a class="brand" th:href="@{/}" th:text="${title}">MediSlot</a>
    <div class="nav-actions">
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'ADMIN'}" th:href="@{/admin/doctors}">Doctors</a>
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'ADMIN'}" th:href="@{/admin/users}">Users</a>
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'ADMIN'}" th:href="@{/admin/specializations}">Specializations</a>
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'ADMIN'}" th:href="@{/admin/appointments}">Appointments</a>
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'DOCTOR'}" th:href="@{/doctor/slots}">Slots</a>
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'DOCTOR'}" th:href="@{/doctor/appointments}">Appointments</a>
        <a class="button small ghost" th:if="${session.role != null and session.role.name() == 'PATIENT'}" th:href="@{/patient/doctors}">Find Doctors</a>
        <a class="button small ghost" th:if="${session.role != null}" th:href="@{/logout}">Logout</a>
    </div>
</nav>
</body>
</html>
