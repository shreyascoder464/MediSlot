<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{fragments :: nav('Admin Panel')}"></nav>
<main class="container">
    <h1>Admin Dashboard</h1>
    <section class="stats-grid">
        <article class="stat-card"><span>Total Users</span><strong th:text="${users}">0</strong></article>
        <article class="stat-card"><span>Pending Doctors</span><strong th:text="${pendingDoctors}">0</strong></article>
        <article class="stat-card"><span>Appointments</span><strong th:text="${appointments}">0</strong></article>
    </section>
    <section class="panel">
        <div class="panel-title"><h2>Recent Appointments</h2><a th:href="@{/admin/appointments}">View all</a></div>
        <table>
            <tr><th>Patient</th><th>Doctor</th><th>Slot</th><th>Status</th></tr>
            <tr th:each="a : ${recentAppointments}">
                <td th:text="${a.patient.name}"></td>
                <td th:text="${a.doctor.name}"></td>
                <td th:text="${a.slot.slotDate + ' ' + a.slot.startTime}"></td>
                <td><span class="status" th:classappend="${a.status.name().toLowerCase()}" th:text="${a.status}"></span></td>
            </tr>
        </table>
    </section>
</main>
</body>
</html>
