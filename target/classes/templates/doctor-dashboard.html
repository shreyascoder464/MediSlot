<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Doctor Dashboard')}"></head>
<body>
<nav th:replace="~{fragments :: nav('Doctor Panel')}"></nav>
<main class="container">
    <h1>Welcome Dr. <span th:text="${name}"></span></h1>
    <section class="stats-grid">
        <article class="stat-card"><span>Verification</span><strong class="small-strong" th:text="${profile.verificationStatus}"></strong></article>
        <article class="stat-card"><span>Appointments</span><strong th:text="${#lists.size(appointments)}"></strong></article>
    </section>
    <section class="panel">
        <h2>Notifications</h2>
        <p th:if="${#lists.isEmpty(notifications)}" class="muted">No notifications.</p>
        <div class="notice" th:each="n : ${notifications}">
            <strong th:text="${n.title}"></strong>
            <p th:text="${n.message}"></p>
        </div>
    </section>
</main>
</body>
</html>
