<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Specializations')}"></head>
<body>
<nav th:replace="~{fragments :: nav('Admin Panel')}"></nav>
<main class="container">
    <h1>Specializations</h1>
    <div class="alert danger" th:if="${error}" th:text="${error}"></div>
    <section class="panel split">
        <form th:action="@{/admin/specializations}" method="post" class="form">
            <label>Name</label><input name="name" required>
            <label>Description</label><textarea name="description" rows="3"></textarea>
            <button class="button primary">Add Specialization</button>
        </form>
        <table>
            <tr><th>Name</th><th>Description</th><th>Active</th></tr>
            <tr th:each="s : ${specializations}">
                <td th:text="${s.name}"></td>
                <td th:text="${s.description}"></td>
                <td th:text="${s.active}"></td>
            </tr>
        </table>
    </section>
</main>
</body>
</html>
