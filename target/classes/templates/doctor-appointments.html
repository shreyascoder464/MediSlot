<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Doctor Appointments')}"></head>
<body>
<nav th:replace="~{fragments :: nav('Doctor Panel')}"></nav>
<main class="container">
    <h1>Appointments</h1>
    <section class="panel table-wrap">
        <table>
            <tr><th>Patient</th><th>Slot</th><th>Reason</th><th>Status</th><th>Action</th></tr>
            <tr th:each="a : ${appointments}">
                <td th:text="${a.patient.name}"></td>
                <td th:text="${a.slot.slotDate + ' ' + a.slot.startTime}"></td>
                <td th:text="${a.reason}"></td>
                <td><span class="status" th:classappend="${a.status.name().toLowerCase()}" th:text="${a.status}"></span></td>
                <td>
                    <div class="inline-actions" th:if="${a.status.name() == 'PENDING'}">
                        <form th:action="@{/doctor/appointments/{id}/approve(id=${a.id})}" method="post"><button class="button success small">Approve</button></form>
                        <form th:action="@{/doctor/appointments/{id}/reject(id=${a.id})}" method="post"><button class="button danger small">Reject</button></form>
                    </div>
                    <form th:if="${a.status.name() == 'APPROVED'}" th:action="@{/doctor/appointments/{id}/complete(id=${a.id})}" method="post">
                        <button class="button primary small">Complete</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>
</main>
</body>
</html>
